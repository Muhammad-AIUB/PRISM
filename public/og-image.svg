<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0a0a0f"/>
            <stop offset="1" stop-color="#13131a"/>
        </linearGradient>
        <radialGradient id="glow1" cx="0.25" cy="0.20" r="0.55">
            <stop offset="0" stop-color="#6366f1" stop-opacity="0.32"/>
            <stop offset="1" stop-color="#0a0a0f" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="0.80" cy="0.85" r="0.50">
            <stop offset="0" stop-color="#a855f7" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#0a0a0f" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#818cf8"/>
            <stop offset="0.5" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#a855f7"/>
        </linearGradient>
        <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#a855f7"/>
        </linearGradient>
        <filter id="markShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
            <feOffset dx="0" dy="8"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow1)"/>
    <rect width="1200" height="630" fill="url(#glow2)"/>

    <!-- Subtle dot pattern overlay -->
    <g fill="#94a3b8" fill-opacity="0.08">
        <circle cx="100"  cy="100" r="1.5"/><circle cx="150"  cy="100" r="1.5"/><circle cx="200"  cy="100" r="1.5"/>
        <circle cx="100"  cy="150" r="1.5"/><circle cx="150"  cy="150" r="1.5"/><circle cx="200"  cy="150" r="1.5"/>
        <circle cx="1000" cy="500" r="1.5"/><circle cx="1050" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
        <circle cx="1000" cy="550" r="1.5"/><circle cx="1050" cy="550" r="1.5"/><circle cx="1100" cy="550" r="1.5"/>
    </g>

    <!-- Prism mark -->
    <g transform="translate(110 200)" filter="url(#markShadow)">
        <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#mark)"/>
        <g transform="translate(30 30)" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M0 14 L30 0 L60 14 L30 28 Z"/>
            <path d="M0 30 L30 44 L60 30"/>
            <path d="M0 46 L30 60 L60 46"/>
        </g>
    </g>

    <!-- Wordmark -->
    <text x="265" y="305"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="120"
          font-weight="800"
          letter-spacing="-3"
          fill="url(#brand)">PRism</text>

    <!-- Tagline -->
    <text x="110" y="395"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="42"
          font-weight="600"
          fill="#f1f5f9">AI-powered code review</text>

    <text x="110" y="450"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28"
          font-weight="400"
          fill="#94a3b8">Security · Performance · Code Quality — on every PR.</text>

    <!-- Footer chips -->
    <g transform="translate(110 510)">
        <g>
            <rect x="0" y="0" width="160" height="44" rx="22" fill="#1a1a24" stroke="#262635" stroke-width="1"/>
            <text x="80" y="29" text-anchor="middle"
                  font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
                  font-size="16" font-weight="500" fill="#e2e8f0">🔓 Open Source</text>
        </g>
        <g transform="translate(180 0)">
            <rect x="0" y="0" width="190" height="44" rx="22" fill="#1a1a24" stroke="#262635" stroke-width="1"/>
            <text x="95" y="29" text-anchor="middle"
                  font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
                  font-size="16" font-weight="500" fill="#e2e8f0">🔐 Self-Hostable</text>
        </g>
        <g transform="translate(390 0)">
            <rect x="0" y="0" width="160" height="44" rx="22" fill="#1a1a24" stroke="#262635" stroke-width="1"/>
            <text x="80" y="29" text-anchor="middle"
                  font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
                  font-size="16" font-weight="500" fill="#e2e8f0">⚡ Free Tier</text>
        </g>
    </g>
</svg>
