[www]
listen = 127.0.0.1:9000

; Tuned for Render's 512 MB free instance. AI review jobs run inside php-fpm
; workers (QUEUE_CONNECTION=sync + dispatchAfterResponse), so each busy worker
; can hold a diff + JSON + HTTP buffers and approach the 128 MB memory_limit.
; pm.max_children=10 could therefore demand >1 GB and OOM-kill the container
; (Render shows this as "Instance failed"). "ondemand" keeps idle memory near
; zero and caps concurrency so total RSS stays under 512 MB.
pm = ondemand
pm.max_children = 4
pm.process_idle_timeout = 10s

; Recycle a worker after N requests so any per-request memory growth is released
; back to the OS instead of accumulating until OOM.
pm.max_requests = 200

clear_env = no
catch_workers_output = yes
decorate_workers_output = no

; Hard ceiling per worker. Keeps a single runaway request from ballooning past
; what the box can afford while still leaving headroom for an AI review job.
php_admin_value[memory_limit] = 128M
