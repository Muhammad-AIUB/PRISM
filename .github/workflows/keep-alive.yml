name: Keep Render awake

# Render's free tier spins a web service down after 15 minutes of inactivity,
# and the next visitor then waits ~50s for a cold start. Pinging the lightweight
# Laravel health endpoint (/up) every 10 minutes keeps the instance warm.
#
# Note: GitHub's scheduled runs can be delayed several minutes under load, which
# is why the interval is 10 min (not 14) — it leaves margin against the 15-min
# spin-down even when a run is late.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # allows a manual ping from the Actions tab

# A late run shouldn't pile up behind an in-flight one.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          # Override in repo Settings → Secrets and variables → Actions → Variables
          # if your Render URL differs from the default below.
          PRISM_URL: ${{ vars.PRISM_URL || 'https://prism-2o7j.onrender.com' }}
        run: |
          echo "Pinging ${PRISM_URL}/up"
          code=$(curl -sS -o /dev/null -w '%{http_code}' --retry 3 --retry-all-errors --max-time 90 "${PRISM_URL}/up")
          echo "HTTP $code"
          # 2xx/3xx = awake. Anything else fails the run so you get notified.
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::Health check returned $code"
            exit 1
          fi
